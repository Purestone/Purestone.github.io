<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>River</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #fff; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C = document.getElementById('c');
const X = C.getContext('2d');

function resize() { C.width = innerWidth; C.height = innerHeight; }
resize();
addEventListener('resize', resize);

// River lanes: far (top, small, light) → near (bottom, big, dark)
const LANES = [
  { yF: 0.43, gray: 210, size: 0.8, speed: 0.8, count: 50 },
  { yF: 0.46, gray: 185, size: 1.2, speed: 1.0, count: 60 },
  { yF: 0.52, gray: 155, size: 1.6, speed: 1.3, count: 70 },
  { yF: 0.62, gray: 120, size: 2.0, speed: 1.6, count: 80 },
  { yF: 0.77, gray: 80,  size: 2.4, speed: 2.0, count: 90 },
];

let wind = 1.2 + Math.random() * 0.8;
let windTarget = wind;
let windTimer = 0;
let t = 0;

const particles = [];

function createParticle(lane, laneIdx) {
  const W = C.width;
  const H = C.height;
  const maxDist = W * (0.6 + Math.random() * 0.8);
  return {
    lane: laneIdx,
    x: Math.random() * W * 1.2 - W * 0.1,
    y: H * lane.yF + (Math.random() - 0.5) * H * 0.015,
    vx: 0, vy: 0,
    dist: Math.random() * maxDist,
    maxDist,
    size: lane.size * (0.6 + Math.random() * 0.8),
    gray: lane.gray + Math.floor((Math.random() - 0.5) * 20),
    alpha: 0,
    wobblePhase: Math.random() * Math.PI * 2,
    wobbleAmp: 0.2 + Math.random() * 0.5,
  };
}

function init() {
  particles.length = 0;
  LANES.forEach((lane, i) => {
    for (let j = 0; j < lane.count; j++) particles.push(createParticle(lane, i));
  });
}
init();

function waveDy(laneIdx, x) {
  const H = C.height;
  const lane = LANES[laneIdx];
  const baseAmp = H * 0.012 * (1 + laneIdx * 0.1);
  const freq = 0.004 + laneIdx * 0.0008;
  return Math.sin(x * freq - t * lane.speed * 1.2) * baseAmp * wind
       + Math.sin(x * freq * 1.8 - t * lane.speed * 0.6 + laneIdx) * baseAmp * 0.2 * wind;
}

function draw() {
  t += 0.016;

  windTimer--;
  if (windTimer <= 0) {
    windTarget = 0.8 + Math.random() * 1.4;
    windTimer = 150 + Math.random() * 400;
  }
  wind += (windTarget - wind) * 0.006;
  if (wind < 0.5) wind = 0.5;

  const W = C.width;
  const H = C.height;

  X.fillStyle = '#fff';
  X.fillRect(0, 0, W, H);

  // Glow layer behind particles
  for (const lane of LANES) {
    const y = H * lane.yF;
    const g = X.createLinearGradient(0, y - H * 0.025, 0, y + H * 0.025);
    g.addColorStop(0, 'rgba(255,255,255,0)');
    g.addColorStop(0.5, `rgba(${lane.gray},${lane.gray},${lane.gray},0.04)`);
    g.addColorStop(1, 'rgba(255,255,255,0)');
    X.fillStyle = g;
    X.fillRect(0, y - H * 0.025, W, H * 0.05);
  }

  for (const p of particles) {
    const lane = LANES[p.lane];

    // Velocity (compute before distance so first frame has correct step)
    const speedMul = lane.speed * (W / 800);
    p.vx = -speedMul;
    p.vy = (H * lane.yF + waveDy(p.lane, p.x) - p.y) * 0.03;
    p.vy += Math.sin(t * 2.0 + p.wobblePhase) * p.wobbleAmp * 0.08;
    p.vx += wind * 0.12;
    p.vy += Math.sin(p.x * 0.006 + t) * wind * 0.04;

    // Distance-based lifecycle
    const step = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    p.dist += step;
    if (p.dist >= p.maxDist) {
      Object.assign(p, createParticle(lane, p.lane));
      p.x = W + Math.random() * W * 0.1;
      p.dist = 0;
      continue;
    }

    const dr = p.dist / p.maxDist;
    if (dr < 0.08) p.alpha = dr / 0.08;
    else if (dr > 0.85) p.alpha = (1 - dr) / 0.15;
    else p.alpha = 1;

    p.x += p.vx;
    p.y += p.vy;

    // Vertical pull-back
    const yTarget = H * lane.yF + waveDy(p.lane, p.x);
    if (Math.abs(p.y - yTarget) > H * 0.04) p.y += (yTarget - p.y) * 0.06;

    // Wrap
    if (p.x < -10) { Object.assign(p, createParticle(lane, p.lane)); p.x = W + Math.random() * 20; p.dist = 0; }
    if (p.x > W + 30) { Object.assign(p, createParticle(lane, p.lane)); p.x = -Math.random() * 20; p.dist = 0; }

    // Draw dot particle
    const g = p.gray;
    const a = p.alpha * 0.9;
    const r = Math.max(0.5, p.size * (W / 800));
    X.fillStyle = `rgba(${g},${g},${g},${a})`;
    X.beginPath();
    X.arc(p.x, p.y, r, 0, Math.PI * 2);
    X.fill();
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
