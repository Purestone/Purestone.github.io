<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowing East</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #fff; overflow: hidden; height: 100vh; }
    .title {
      position: absolute;
      top: 38.2%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      font-weight: 300;
      font-size: clamp(28px, 5.5vw, 56px);
      color: rgba(150,150,150,0.85);
      letter-spacing: 0.05em;
    }
    svg { position: absolute; top: 61.8%; left: 0; width: 100vw; height: 10vh; overflow: visible; transform: translateY(-50%); }
    svg path {
      fill: none;
      stroke-linecap: round;
    }
  </style>
</head>
<body>
<div class="title">人生长恨水长东</div>
<svg id="waves" viewBox="0 0 1000 100" preserveAspectRatio="none">
  <path id="w0" stroke="rgba(200,200,200,0.5)" stroke-width="2"/>
  <path id="w1" stroke="rgba(180,180,180,0.45)" stroke-width="1.6"/>
  <path id="w2" stroke="rgba(160,160,160,0.4)" stroke-width="1.2"/>
</svg>
<script>
const titleEl = document.querySelector('.title');
const paths = [
  { el: document.getElementById('w0'), y: 55, amp: 18, freq: 0.012, speed: 1.0 },
  { el: document.getElementById('w1'), y: 70, amp: 14, freq: 0.015, speed: 1.3 },
  { el: document.getElementById('w2'), y: 85, amp: 11, freq: 0.018, speed: 1.6 },
];

let t = 0;

function waveY(p, x) {
  return p.y
    + Math.sin(x * p.freq - t * p.speed * 2) * p.amp
    + Math.sin(x * p.freq * 0.5 - t * p.speed * 1.2 + 1) * p.amp * 0.4;
}

function draw() {
  t += 0.016;

  // Sample average y at center of viewport
  let sumY = 0;
  for (const p of paths) sumY += waveY(p, 500);
  const avgY = sumY / paths.length;
  // Map avgY (range ~45-95) to opacity (0.85 ↔ 0.15)
  const opacity = 0.15 + (1 - (avgY - 45) / 50) * 0.7;
  titleEl.style.opacity = Math.max(0.2, Math.min(0.85, opacity));

  for (const p of paths) {
    let d = '';
    for (let x = 0; x <= 1000; x += 4) {
      const y = waveY(p, x);
      d += x === 0 ? `M${x},${y}` : `L${x},${y}`;
    }
    p.el.setAttribute('d', d);
  }
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
